<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendell Armengol Jarquín Vivas</title>
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
        }

        .student-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.10;
            pointer-events: none;
        }

        .student-bg i {
            position: absolute;
            font-size: 4rem;
            color: #00bcd4;
            opacity: 0.7;
            animation: float 6s ease-in-out infinite alternate;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-30px);
            }
        }

        .center-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .animated-name {
            font-size: 4vw;
            font-weight: 900;
            color: #fff !important;
            text-shadow: 0 4px 24px #00bcd4, 0 0 10px #232526;
            letter-spacing: 3px;
            margin-bottom: 2.5rem;
            margin-top: 0;
            width: 100vw;
            text-align: center;
            animation: none;
        }

        .student-nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .student-nav a {
            text-decoration: none;
            color: #232526;
            background: #00bcd4;
            padding: 0.8em 2.2em;
            border-radius: 30px;
            margin: 0 0.5em;
            font-weight: 700;
            font-size: 1.3rem;
            box-shadow: 0 2px 12px #00bcd488;
            transition: background 0.2s, color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5em;
        }

        .student-nav a:hover {
            background: #fff;
            color: #00bcd4;
            transform: scale(1.07);
        }
    </style>
</head>

<body>
    <div class="student-bg">
